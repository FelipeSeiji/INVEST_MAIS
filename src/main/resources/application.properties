spring.application.name=mvp

 # Banco H2 com senha obrigatĂłria via ambiente (ou definida no profile de Dev)
spring.datasource.url=${DB_URL}
spring.datasource.driverClassName=${DB_DRIVER}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=${DB_PLATFORM}
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:update}

# Console H2 (Habilitado para o dev - Blindado para o Nmap)
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# Chaves sensĂ­veis sem fallback inseguro
api.security.token.secret=${JWT_KEY}
api.security.db.encryption.key=${DB_ENCRYPTION_KEY}

# E-mail (Mantido o bom trabalho)
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# SSL
server.port=${PORT:${SERVER_PORT:8080}}
server.ssl.enabled=${SSL_ENABLED:false}
server.ssl.key-store-type=${STORE_TYPE:}
server.ssl.key-store=${KEY_STORE:}
server.ssl.key-store-password=${SSL_PASSWORD:}
server.ssl.key-alias=mvp-investimentos

# Estrutura mantida no properties, mas sem expor valores
security.argon2.salt-length=${ARGON2_SALT_LENGTH}
security.argon2.hash-length=${ARGON2_HASH_LENGTH}
security.argon2.parallelism=${ARGON2_PARALLELISM}
security.argon2.memory=${ARGON2_MEMORY}
security.argon2.iterations=${ARGON2_ITERATIONS}

# KDF para derivaĂ§ĂŁo da chave AES do banco
security.aes.kdf.salt=${DB_AES_KDF_SALT}
security.aes.kdf.iterations=${DB_AES_KDF_ITERATIONS}

# SeguranĂ§a e Hardening
# Impede a exibiĂ§ĂŁo de detalhes tĂ©cnicos em pĂĄginas de erro padrĂŁo (Ex: stacktraces, mensagens da JVM)
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# Oculta a versĂŁo do Spring e banner no startup para evitar fingerprinting bĂĄsico
spring.main.banner-mode=off

# Swagger/OpenAPI habilitado (Blindado via Honeypot para IPs externos)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true