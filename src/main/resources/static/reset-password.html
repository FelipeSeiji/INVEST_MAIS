<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>
    <link rel="stylesheet" href="css/auth.css">
    <style>
        .hidden { display: none; }
        .step-box { transition: all 0.5s ease; }
    </style>
</head>
<body>

<div class="container">
    <div class="box step-box">
        <h2>Recuperar Senha</h2>
        
        <div id="step1">
            <p>Digite seu e-mail para receber o código de recuperação.</p>
            <input type="email" id="forgotEmail" placeholder="E-mail">
            <button onclick="handleForgotPassword()">Enviar Código</button>
            <div id="forgotMsg" class="message"></div>
        </div>

        <div id="step2" class="hidden">
            <p style="color: #28a745; font-weight: bold;">Código enviado! Verifique seu e-mail.</p>
            <input type="text" id="resetToken" placeholder="Digite o Token recebido">
            <input type="password" id="newPassword" placeholder="Nova Senha">
            <input type="password" id="confirmPassword" placeholder="Confirmar Nova Senha">
            <button onclick="handleResetPassword()" style="background-color: #28a745;">Alterar Senha</button>
            <div id="resetMsg" class="message"></div>
        </div>

        <br>
        <a href="index.html" style="text-align: center; color: #4b4b4b; text-decoration: none; display: block;">Voltar ao Login</a>
    </div>
</div>

    <script src="js/resetpassword.js"></script>
</body>
</html>
