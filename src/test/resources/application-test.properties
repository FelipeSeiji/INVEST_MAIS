# Configurações de teste - Referenciando variáveis TEST_ do .env
server.port=${TEST_SERVER_PORT}

spring.datasource.url=${TEST_DB_URL}
spring.datasource.driverClassName=${TEST_DB_DRIVER}
spring.datasource.username=${TEST_DB_USERNAME}
spring.datasource.password=${TEST_DB_PASSWORD}
spring.jpa.database-platform=${TEST_DB_PLATFORM}

api.security.token.secret=${TEST_JWT_KEY}
api.security.db.encryption.key=${TEST_DB_ENCRYPTION_KEY}

spring.mail.host=${TEST_MAIL_HOST}
spring.mail.port=${TEST_MAIL_PORT}
spring.mail.username=${TEST_MAIL_USERNAME}
spring.mail.password=${TEST_MAIL_PASSWORD}

server.ssl.key-store-type=${TEST_STORE_TYPE}
server.ssl.key-store=${TEST_KEY_STORE}
server.ssl.key-store-password=${TEST_SSL_PASSWORD}

security.argon2.salt-length=${TEST_ARGON2_SALT_LENGTH}
security.argon2.hash-length=${TEST_ARGON2_HASH_LENGTH}
security.argon2.parallelism=${TEST_ARGON2_PARALLELISM}
security.argon2.memory=${TEST_ARGON2_MEMORY}
security.argon2.iterations=${TEST_ARGON2_ITERATIONS}

security.aes.kdf.salt=${TEST_DB_AES_KDF_SALT}
security.aes.kdf.iterations=${TEST_DB_AES_KDF_ITERATIONS}
