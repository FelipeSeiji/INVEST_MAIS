spring.application.name=mvp

 # Banco H2 com senha obrigatória via ambiente (ou definida no profile de Dev)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${H2_USERNAME}
spring.datasource.password=${H2_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console H2 desabilitado por padrão (habilite apenas no application-dev.properties)
spring.h2.console.enabled=true

# Chaves sensíveis sem fallback inseguro
api.security.token.secret=${JWT_SECRET:mysecretkey}
api.security.db.encryption.key=${DB_ENCRYPTION_KEY}

# E-mail (Mantido o bom trabalho)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# SSL
server.port=8443
server.ssl.key-store-type=PKCS12
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SSL_PASSWORD}
server.ssl.key-alias=mvp-investimentos